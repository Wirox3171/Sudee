<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudee ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;
font-family:'Segoe UI',sans-serif;text-align:center;color:white;
background:linear-gradient(-45deg,#ff4d8d,#ff85b3,#ffbfd6,#ffe6f0);
background-size:400% 400%;animation:bg 12s ease infinite;
}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card{max-width:900px;padding:40px;text-shadow:0 0 15px rgba(0,0,0,.25)}
h1{font-size:4rem;margin-bottom:20px}
h2{font-size:2rem;margin-bottom:25px}
.message{font-size:1.4rem;line-height:1.8}
.glow{color:#fff59d;font-weight:bold}
.heart{position:absolute;font-size:24px;animation:float 8s linear infinite}
@keyframes float{
from{transform:translateY(100vh) rotate(0deg);opacity:1}
to{transform:translateY(-150px) rotate(360deg);opacity:0}
}
</style>
</head>
<body>

<div class="card">
<h1>💖 Sudee 💖</h1>
<h2>Benim İçin Çok Özelsin</h2>
<div class="message">
Hayatıma kattığın tüm güzellikler için teşekkür ederim.<br><br>
Gülüşün günümü aydınlatıyor, varlığın bana güç veriyor.<br><br>
<span class="glow">İyi ki varsın ❤️</span>
</div>
</div>

<script>
for(let i=0;i<40;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDelay=Math.random()*8+"s";
 h.style.fontSize=(20+Math.random()*20)+"px";
 document.body.appendChild(h);
}
</script>

</body>
</html>
